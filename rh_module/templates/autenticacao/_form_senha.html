{% if messages %}
  {% for msg in messages %}
  <div class="{% if user.is_authenticated %}msg {{ msg.tags }}{% else %}login-error{% endif %}" style="margin-bottom:16px;">
    {{ msg }}
  </div>
  {% endfor %}
{% endif %}

<form method="post">
  {% csrf_token %}

  <div class="form-group">
    <label class="form-label">Senha Atual</label>
    <input
      type="password"
      name="senha_atual"
      class="form-control"
      placeholder="••••••••"
      autofocus
      required
    />
  </div>

  <div class="form-group">
    <label class="form-label">Nova Senha</label>
    <input
      type="password"
      name="nova_senha"
      class="form-control"
      placeholder="••••••••"
      required
    />
  </div>

  <div class="form-group">
    <label class="form-label">Confirmar Nova Senha</label>
    <input
      type="password"
      name="confirmar_senha"
      class="form-control"
      placeholder="••••••••"
      required
    />
    {% if form.errors %}
      {% for field, errors in form.errors.items %}
        {% for error in errors %}
        <span class="form-error">{{ error }}</span>
        {% endfor %}
      {% endfor %}
    {% endif %}
  </div>

  {% if user.is_authenticated %}
    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
      Salvar Nova Senha
    </button>
  {% else %}
    <button type="submit" class="btn-login">
      Salvar e Acessar o Sistema
    </button>
  {% endif %}
</form>
